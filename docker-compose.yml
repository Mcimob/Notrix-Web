
services:
  notrix:
    image: ghcr.io/mcimob/notrix-web/java:latest
    ports:
      - 8080:8080
    networks:
      - db
      - server
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    depends_on:
      - postgres

  server:
    image: ghcr.io/mcimob/notrix-web/python:latest
    networks:
      - server
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: unless-stopped

  postgres:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /data/postgres
      POSTGRES_DB: kaggle-vis
    volumes:
      - db:/data/postgres
      - ./python/data:/initData
    networks:
      - db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  db:
  server:

volumes:
  db: