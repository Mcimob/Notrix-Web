name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Java image
        uses: docker/build-push-action@v5
        with:
          context: ./java
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/java:latest
            ghcr.io/${{ env.REPO_LC }}/java:${{ github.sha }}

      - name: Build and push Python image
        uses: docker/build-push-action@v5
        with:
          context: ./python
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/python:latest
            ghcr.io/${{ env.REPO_LC }}/python:${{ github.sha }}
